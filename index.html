<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>챌린지 차트 2026</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: #f7f7f7;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 1.5rem 1rem 3rem;
}
.app { width: 100%; max-width: 700px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 18px; font-weight: 600; color: #111; }
.header-right { display: flex; align-items: center; gap: 8px; }
.month-nav { display: flex; align-items: center; gap: 6px; }
.nav-btn { background: #fff; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); padding: 4px 10px; cursor: pointer; font-size: 13px; color: #333; font-family: var(--font-sans); }
.nav-btn:hover { background: #f0f0f0; }
.month-label { font-size: 14px; font-weight: 500; min-width: 80px; text-align: center; color: #111; }
.settings-btn { background: #fff; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); padding: 4px 10px; cursor: pointer; font-size: 13px; color: #666; font-family: var(--font-sans); }
.settings-btn:hover { background: #f0f0f0; }
.phase-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day-header { text-align: center; font-size: 11px; color: #999; padding: 4px 0; font-weight: 500; }
.day-cell { border: 0.5px solid #e5e5e5; border-radius: var(--border-radius-md); padding: 5px 4px; min-height: 68px; cursor: pointer; transition: border-color 0.1s; background: #fff; }
.day-cell:hover { border-color: #aaa; }
.day-cell.today { box-shadow: inset 0 0 0 2px #378ADD; }
.day-cell.empty { background: none; border-color: transparent; cursor: default; pointer-events: none; }
.day-num { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 2px; }
.phase-tag { font-size: 9px; font-weight: 500; padding: 1px 4px; border-radius: 3px; display: inline-block; margin-bottom: 2px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dot-row { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #ddd; }
.dot.done { background: #1D9E75; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
.modal-bg.open { display: flex; }
.modal { background: #ffffff; border-radius: var(--border-radius-lg); border: 0.5px solid #d0d0d0; padding: 1.25rem; width: 100%; max-width: 440px; margin: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.modal-title { font-size: 16px; font-weight: 500; color: #111; }
.close-btn { background: none; border: none; cursor: pointer; font-size: 22px; color: #888; line-height: 1; padding: 0 2px; }
.section-label { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 6px; margin-top: 0.85rem; }
.meal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.meal-check { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #111; min-width: 36px; }
.meal-check input { cursor: pointer; accent-color: #1D9E75; width: 14px; height: 14px; }
.text-input { flex: 1; padding: 5px 8px; font-size: 13px; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); background: #fff; color: #111; font-family: var(--font-sans); }
.text-input:focus { outline: none; border-color: #378ADD; }
.num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.num-label { font-size: 11px; color: #666; margin-bottom: 3px; }
.num-input { width: 100%; padding: 5px 8px; font-size: 13px; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); background: #fff; color: #111; font-family: var(--font-sans); }
.num-input:focus { outline: none; border-color: #378ADD; }
textarea.num-input { resize: vertical; min-height: 44px; }
.seg-wrap { display: flex; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); overflow: hidden; }
.seg-wrap input[type=radio] { display: none; }
.seg-wrap label { flex: 1; text-align: center; padding: 5px 2px; font-size: 12px; cursor: pointer; color: #666; border-right: 0.5px solid #ddd; background: #fff; transition: background 0.1s; }
.seg-wrap label:last-of-type { border-right: none; }
.seg-wrap input[type=radio]:checked + label { background: #dbeeff; color: #185FA5; font-weight: 500; }
.check-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #111; cursor: pointer; padding: 5px 8px; border-radius: 6px; border: 0.5px solid #ddd; background: #fff; }
.check-item:hover { background: #f5f5f5; }
.check-item input { cursor: pointer; width: 14px; height: 14px; accent-color: #1D9E75; }
.bowel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.bowel-check { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #111; min-width: 36px; }
.bowel-check input { cursor: pointer; accent-color: #1D9E75; width: 14px; height: 14px; }
.supp-row { display: flex; align-items: center; gap: 8px; }
.supp-check { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #111; min-width: 36px; }
.supp-check input { cursor: pointer; accent-color: #1D9E75; width: 14px; height: 14px; }
.save-btn { width: 100%; padding: 8px; background: #185FA5; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; margin-top: 0.75rem; font-family: var(--font-sans); }
.save-btn:hover { background: #0C447C; }
.settings-modal { background: #ffffff; border-radius: var(--border-radius-lg); border: 0.5px solid #d0d0d0; padding: 1.25rem; width: 100%; max-width: 480px; margin: auto; }
.col-header { font-size: 11px; color: #666; font-weight: 500; }
.color-pick { width: 100%; padding: 4px 6px; font-size: 12px; border: 0.5px solid #ddd; border-radius: var(--border-radius-md); background: #fff; color: #111; font-family: var(--font-sans); }
.add-phase-btn { background: none; border: 0.5px dashed #ccc; border-radius: var(--border-radius-md); padding: 5px 10px; cursor: pointer; font-size: 12px; color: #888; width: 100%; margin-top: 4px; font-family: var(--font-sans); }
.add-phase-btn:hover { background: #f5f5f5; }
.remove-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px; line-height: 1; }
.remove-btn:hover { color: #E24B4A; }
.settings-save-btn { width: 100%; padding: 8px; background: #185FA5; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; margin-top: 0.75rem; font-family: var(--font-sans); }
.settings-save-btn:hover { background: #0C447C; }
.progress-section { margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid #e5e5e5; }
.prog-label { font-size: 12px; color: #888; margin-bottom: 5px; }
.prog-bg { height: 6px; background: #e5e5e5; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: #1D9E75; border-radius: 4px; transition: width 0.3s; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 0.75rem; }
.stat-card { background: #f3f3f3; border-radius: var(--border-radius-md); padding: 8px 10px; text-align: center; }
.stat-num { font-size: 18px; font-weight: 500; color: #111; }
.stat-lbl { font-size: 11px; color: #888; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>챌린지 차트 2026</h1>
    <div class="header-right">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <button class="settings-btn" onclick="openSettings()">⚙ 페이즈 설정</button>
    </div>
  </div>
  <div class="phase-legend" id="phase-legend"></div>
  <div class="calendar-grid">
    <div class="day-header">일</div><div class="day-header">월</div>
    <div class="day-header">화</div><div class="day-header">수</div>
    <div class="day-header">목</div><div class="day-header">금</div>
    <div class="day-header">토</div>
  </div>
  <div class="calendar-grid" id="calendar"></div>
  <div class="progress-section">
    <div class="prog-label" id="prog-label"></div>
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">기록 일수</div></div>
      <div class="stat-card"><div class="stat-num" id="s-streak">0</div><div class="stat-lbl">연속 달성</div></div>
      <div class="stat-card"><div class="stat-num" id="s-pct">0%</div><div class="stat-lbl">달성률</div></div>
    </div>
  </div>
</div>

<!-- 기록 모달 -->
<div class="modal-bg" id="record-modal-bg" onclick="if(event.target===this)closeRecordModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-date-title"></span>
      <button class="close-btn" onclick="closeRecordModal()" aria-label="닫기">×</button>
    </div>
    <div id="modal-phase-tag" style="margin-bottom:0.75rem"></div>
    <div class="section-label">식단</div>
    <div class="meal-row">
      <label class="meal-check"><input type="checkbox" id="f-morning"> 아침</label>
      <input class="text-input" type="text" id="f-morning-text" placeholder="먹은 것 기록...">
    </div>
    <div class="meal-row">
      <label class="meal-check"><input type="checkbox" id="f-lunch"> 점심</label>
      <input class="text-input" type="text" id="f-lunch-text" placeholder="먹은 것 기록...">
    </div>
    <div class="meal-row">
      <label class="meal-check"><input type="checkbox" id="f-dinner"> 저녁</label>
      <input class="text-input" type="text" id="f-dinner-text" placeholder="먹은 것 기록...">
    </div>
    <div class="meal-row">
      <label class="meal-check"><input type="checkbox" id="f-snack"> 간식</label>
      <input class="text-input" type="text" id="f-snack-text" placeholder="간식 내용...">
    </div>
    <div class="section-label">수분 &amp; 카페인</div>
    <div class="num-grid" style="margin-bottom:6px">
      <div>
        <div class="num-label">물 (L)</div>
        <div class="seg-wrap">
          <input type="radio" name="water" id="w0" value="0"><label for="w0">0</label>
          <input type="radio" name="water" id="w05" value="0.5"><label for="w05">0.5</label>
          <input type="radio" name="water" id="w1" value="1"><label for="w1">1</label>
          <input type="radio" name="water" id="w15" value="1.5"><label for="w15">1.5</label>
          <input type="radio" name="water" id="w2" value="2"><label for="w2">2</label>
          <input type="radio" name="water" id="w25" value="2.5"><label for="w25">2.5</label>
          <input type="radio" name="water" id="w3" value="3"><label for="w3">3</label>
        </div>
      </div>
      <div>
        <div class="num-label">커피 (잔)</div>
        <div class="seg-wrap">
          <input type="radio" name="coffee" id="c0" value="0"><label for="c0">0</label>
          <input type="radio" name="coffee" id="c1" value="1"><label for="c1">1</label>
          <input type="radio" name="coffee" id="c2" value="2"><label for="c2">2</label>
          <input type="radio" name="coffee" id="c3" value="3"><label for="c3">3</label>
        </div>
      </div>
    </div>
    <div class="section-label">생활기록</div>
    <div class="num-grid" style="margin-bottom:6px">
      <div><div class="num-label">수면 (시간)</div><input class="num-input" type="number" id="f-sleep" min="0" max="24" step="0.5" placeholder="7.5"></div>
      <div><div class="num-label">수면질 (1–5)</div><input class="num-input" type="number" id="f-sleepq" min="1" max="5" placeholder="3"></div>
      <div><div class="num-label">체온 (°C)</div><input class="num-input" type="number" id="f-temp" step="0.1" placeholder="36.5"></div>
      <div><div class="num-label">체중 (kg)</div><input class="num-input" type="number" id="f-weight" step="0.1" placeholder="55.0"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <label class="check-item"><input type="checkbox" id="f-activity"> 활동</label>
      <label class="check-item"><input type="checkbox" id="f-exercise"> 운동</label>
    </div>
    <div class="section-label">영양제</div>
    <div class="supp-row">
      <label class="supp-check"><input type="checkbox" id="f-supp"> 복용</label>
      <input class="text-input" type="text" id="f-supp-text" placeholder="먹은 영양제 기록... (예: 마그네슘, 비타민D)">
    </div>
    <div class="section-label">배변</div>
    <div class="bowel-row">
      <label class="bowel-check"><input type="checkbox" id="f-bowel"> 배변</label>
      <div style="flex:1">
        <div class="seg-wrap">
          <input type="radio" name="bowel-q" id="bq0" value=""><label for="bq0">-</label>
          <input type="radio" name="bowel-q" id="bq1" value="1"><label for="bq1">매우좋음</label>
          <input type="radio" name="bowel-q" id="bq2" value="2"><label for="bq2">좋음</label>
          <input type="radio" name="bowel-q" id="bq3" value="3"><label for="bq3">보통</label>
          <input type="radio" name="bowel-q" id="bq4" value="4"><label for="bq4">나쁨</label>
        </div>
      </div>
    </div>
    <div class="section-label">메모</div>
    <textarea class="num-input" id="f-memo" placeholder="오늘의 메모..."></textarea>
    <button class="save-btn" onclick="saveRecord()">저장</button>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-bg" id="settings-modal-bg" onclick="if(event.target===this)closeSettings()">
  <div class="settings-modal">
    <div class="modal-header">
      <span class="modal-title">페이즈 설정</span>
      <button class="close-btn" onclick="closeSettings()" aria-label="닫기">×</button>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:0.75rem">날짜 범위에 페이즈를 지정하세요. 겹치는 날짜는 위 항목이 우선 적용됩니다.</p>
    <div style="display:grid;grid-template-columns:64px 76px 1fr 1fr 24px;gap:6px;align-items:center;margin-bottom:6px">
      <span class="col-header">이름</span><span class="col-header">색상</span>
      <span class="col-header">시작일</span><span class="col-header">종료일</span><span></span>
    </div>
    <div id="phase-rows"></div>
    <button class="add-phase-btn" onclick="addPhaseRow()">+ 페이즈 추가</button>
    <button class="settings-save-btn" onclick="saveSettings()">저장</button>
  </div>
</div>

<script>
const STORAGE_KEY='challenge2026_v3';
const PHASE_KEY='challenge2026_phases_v3';
const DEFAULT_PHASES=[
  {name:'P1',color:'#E6F1FB',textColor:'#0C447C',start:'2026-05-25',end:'2026-06-04'},
  {name:'P2',color:'#EAF3DE',textColor:'#3B6D11',start:'2026-06-05',end:'2026-06-07'},
  {name:'P3',color:'#FAEEDA',textColor:'#854F0B',start:'2026-06-08',end:'2026-06-13'},
  {name:'P4',color:'#FBEAF0',textColor:'#72243E',start:'2026-06-14',end:'2026-06-18'},
  {name:'예정일',color:'#FCEBEB',textColor:'#A32D2D',start:'2026-06-19',end:'2026-06-19'},
  {name:'P1',color:'#E6F1FB',textColor:'#0C447C',start:'2026-06-20',end:'2026-06-28'},
  {name:'P2',color:'#EAF3DE',textColor:'#3B6D11',start:'2026-06-29',end:'2026-07-01'},
  {name:'P3',color:'#FAEEDA',textColor:'#854F0B',start:'2026-07-02',end:'2026-07-07'},
  {name:'P4',color:'#FBEAF0',textColor:'#72243E',start:'2026-07-08',end:'2026-07-14'},
  {name:'예정일',color:'#FCEBEB',textColor:'#A32D2D',start:'2026-07-15',end:'2026-07-15'},
  {name:'P1',color:'#E6F1FB',textColor:'#0C447C',start:'2026-07-16',end:'2026-07-21'},
];
let phases=DEFAULT_PHASES,records={};
try{phases=JSON.parse(localStorage.getItem(PHASE_KEY))||DEFAULT_PHASES;}catch(e){}
try{records=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){}
const saveRec=()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}catch(e){}};
const savePhases=()=>{try{localStorage.setItem(PHASE_KEY,JSON.stringify(phases));}catch(e){}};

let curYear=2026,curMonth=4;
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function getPhase(ds){for(const p of phases)if(ds>=p.start&&ds<=p.end)return p;return null;}
function renderLegend(){
  const seen=new Set(),out=[];
  phases.forEach(p=>{const k=p.name+'|'+p.color;if(!seen.has(k)){seen.add(k);out.push(p);}});
  document.getElementById('phase-legend').innerHTML=out.map(p=>`<span class="pill" style="background:${p.color};color:${p.textColor}">${p.name}</span>`).join('');
}
function renderCalendar(){
  renderLegend();
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('month-label').textContent=`${curYear}년 ${months[curMonth]}`;
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++)html+='<div class="day-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const phase=getPhase(ds);
    const isToday=ds===todayStr?'today':'';
    const bg=phase?`background:${phase.color};border-color:${phase.color}`:'';
    const tag=phase?`<span class="phase-tag" style="background:${phase.color};color:${phase.textColor}">${phase.name}</span>`:'';
    const rec=records[ds];
    const dots=rec?['morning','lunch','dinner','water','exercise','supp'].map(k=>`<div class="dot ${rec[k]?'done':''}"></div>`).join(''):'';
    html+=`<div class="day-cell ${isToday}" style="${bg}" onclick="openRecord('${ds}')">
      <div class="day-num">${d}</div>${tag}
      <div class="dot-row">${dots}</div>
    </div>`;
  }
  document.getElementById('calendar').innerHTML=html;
  updateStats();
}
function setRadio(name,val){document.querySelectorAll(`input[name="${name}"]`).forEach(r=>{r.checked=(r.value===String(val));});}
function getRadio(name){const el=document.querySelector(`input[name="${name}"]:checked`);return el?el.value:'';}
let currentDate='';
function openRecord(ds){
  currentDate=ds;
  const phase=getPhase(ds);
  document.getElementById('modal-date-title').textContent=ds;
  document.getElementById('modal-phase-tag').innerHTML=phase?`<span class="pill" style="background:${phase.color};color:${phase.textColor}">${phase.name}</span>`:'';
  const rec=records[ds]||{};
  document.getElementById('f-morning').checked=!!rec.morning;
  document.getElementById('f-morning-text').value=rec.morningText||'';
  document.getElementById('f-lunch').checked=!!rec.lunch;
  document.getElementById('f-lunch-text').value=rec.lunchText||'';
  document.getElementById('f-dinner').checked=!!rec.dinner;
  document.getElementById('f-dinner-text').value=rec.dinnerText||'';
  document.getElementById('f-snack').checked=!!rec.snack;
  document.getElementById('f-snack-text').value=rec.snackText||'';
  setRadio('water',rec.water!=null?rec.water:'');
  setRadio('coffee',rec.coffee!=null?rec.coffee:'');
  document.getElementById('f-sleep').value=rec.sleep||'';
  document.getElementById('f-sleepq').value=rec.sleepq||'';
  document.getElementById('f-temp').value=rec.temp||'';
  document.getElementById('f-weight').value=rec.weight||'';
  document.getElementById('f-activity').checked=!!rec.activity;
  document.getElementById('f-exercise').checked=!!rec.exercise;
  document.getElementById('f-supp').checked=!!rec.supp;
  document.getElementById('f-supp-text').value=rec.suppText||'';
  document.getElementById('f-bowel').checked=!!rec.bowel;
  setRadio('bowel-q',rec.bowelQ||'');
  document.getElementById('f-memo').value=rec.memo||'';
  document.getElementById('record-modal-bg').classList.add('open');
}
function closeRecordModal(){document.getElementById('record-modal-bg').classList.remove('open');}
function saveRecord(){
  const mt=document.getElementById('f-morning-text').value.trim();
  const lt=document.getElementById('f-lunch-text').value.trim();
  const dt=document.getElementById('f-dinner-text').value.trim();
  const st=document.getElementById('f-supp-text').value.trim();
  const wv=getRadio('water');const cv=getRadio('coffee');
  records[currentDate]={
    morning:document.getElementById('f-morning').checked||mt.length>0,morningText:mt,
    lunch:document.getElementById('f-lunch').checked||lt.length>0,lunchText:lt,
    dinner:document.getElementById('f-dinner').checked||dt.length>0,dinnerText:dt,
    snack:document.getElementById('f-snack').checked,snackText:document.getElementById('f-snack-text').value.trim(),
    water:wv!==''?parseFloat(wv):null,
    coffee:cv!==''?parseInt(cv):null,
    sleep:parseFloat(document.getElementById('f-sleep').value)||null,
    sleepq:parseInt(document.getElementById('f-sleepq').value)||null,
    temp:parseFloat(document.getElementById('f-temp').value)||null,
    weight:parseFloat(document.getElementById('f-weight').value)||null,
    activity:document.getElementById('f-activity').checked,
    exercise:document.getElementById('f-exercise').checked,
    supp:document.getElementById('f-supp').checked||st.length>0,suppText:st,
    bowel:document.getElementById('f-bowel').checked,bowelQ:getRadio('bowel-q'),
    memo:document.getElementById('f-memo').value.trim()
  };
  saveRec();closeRecordModal();renderCalendar();
}
const COLOR_PRESETS=[
  {bg:'#E6F1FB',fg:'#0C447C',label:'파랑'},{bg:'#EAF3DE',fg:'#3B6D11',label:'초록'},
  {bg:'#FAEEDA',fg:'#854F0B',label:'노랑'},{bg:'#FBEAF0',fg:'#72243E',label:'핑크'},
  {bg:'#FCEBEB',fg:'#A32D2D',label:'빨강'},{bg:'#EEEDFE',fg:'#3C3489',label:'보라'},
  {bg:'#F1EFE8',fg:'#444441',label:'회색'},
];
function openSettings(){renderPhaseRows();document.getElementById('settings-modal-bg').classList.add('open');}
function closeSettings(){document.getElementById('settings-modal-bg').classList.remove('open');}
function renderPhaseRows(){
  document.getElementById('phase-rows').innerHTML=phases.map((p,i)=>{
    const opts=COLOR_PRESETS.map(c=>`<option value="${c.bg}|${c.fg}" ${p.color===c.bg?'selected':''}>${c.label}</option>`).join('');
    return `<div style="display:grid;grid-template-columns:64px 76px 1fr 1fr 24px;gap:6px;align-items:center;margin-bottom:6px">
      <input class="num-input" type="text" value="${p.name}" placeholder="이름" onchange="phases[${i}].name=this.value" style="padding:4px 6px;font-size:12px">
      <select class="color-pick" onchange="updatePhaseColor(${i},this.value)">${opts}</select>
      <input class="num-input" type="date" value="${p.start}" onchange="phases[${i}].start=this.value" style="padding:4px 6px;font-size:12px">
      <input class="num-input" type="date" value="${p.end}" onchange="phases[${i}].end=this.value" style="padding:4px 6px;font-size:12px">
      <button class="remove-btn" onclick="removePhase(${i})">×</button>
    </div>`;
  }).join('');
}
function updatePhaseColor(i,val){const[bg,fg]=val.split('|');phases[i].color=bg;phases[i].textColor=fg;}
function removePhase(i){phases.splice(i,1);renderPhaseRows();}
function addPhaseRow(){phases.push({name:'새 페이즈',color:'#F1EFE8',textColor:'#444441',start:'2026-05-25',end:'2026-05-25'});renderPhaseRows();}
function saveSettings(){savePhases();closeSettings();renderCalendar();}
function updateStats(){
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const allDays=new Set();
  phases.forEach(p=>{let d=new Date(p.start);const end=new Date(p.end);while(d<=end){allDays.add(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}});
  const total=allDays.size;
  let recorded=0;
  allDays.forEach(ds=>{const rec=records[ds];if(rec&&(rec.morning||rec.lunch||rec.dinner||rec.water!=null||rec.exercise||rec.supp))recorded++;});
  let streak=0;
  for(let i=0;i<90;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    if(!allDays.has(ds))continue;
    const rec=records[ds];
    if(rec&&(rec.morning||rec.lunch||rec.dinner||rec.water!=null))streak++;
    else if(ds<=todayStr)break;
  }
  const pct=total>0?Math.round(recorded/total*100):0;
  document.getElementById('prog-label').textContent=`전체 진행률 (${recorded}/${total}일)`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('s-total').textContent=recorded;
  document.getElementById('s-streak').textContent=streak;
  document.getElementById('s-pct').textContent=pct+'%';
}
renderCalendar();
</script>
